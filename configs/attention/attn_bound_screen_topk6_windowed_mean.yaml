# Control config: windowed gather but with MEAN aggregation inside the window.
# Used to isolate "windowing alone" vs "windowing + max" in the passkey ablation.
method:
  name: adaptive_attention

adaptive_attention:
  block_size: 64
  top_k: 6
  mode: residual_refine
  selector: bound_screen
  delta: 1.0
  summary: mean
  impl: gather_windowed
  query_window_size: 64
  query_score: mean
  target_layers: all
  debug_exact: false
