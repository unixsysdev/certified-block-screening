name: Build paper

on:
  push:
    branches: [main]
    paths:
      - 'paper/**'
      - '.github/workflows/paper.yml'
  pull_request:
    paths:
      - 'paper/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build LaTeX paper
        uses: xu-cheng/latex-action@v3
        with:
          root_file: paper/main.tex
          working_directory: .
          # Natbib requires bibtex; pdflatex + bibtex + pdflatex x2 is the classic dance.
          latexmk_use_xelatex: false
          latexmk_shell_escape: false
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Upload paper PDF
        uses: actions/upload-artifact@v4
        with:
          name: certified-block-screening-paper
          path: paper/main.pdf
          if-no-files-found: error
          retention-days: 30
