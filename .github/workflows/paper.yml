name: Build paper

on:
  push:
    branches: [main]
    paths:
      - 'paper/**'
      - '.github/workflows/paper.yml'
  pull_request:
    paths:
      - 'paper/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build LaTeX paper
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: paper
          # Default latexmk invocation handles bibtex automatically.

      - name: Upload paper PDF as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: certified-block-screening-paper
          path: paper/main.pdf
          if-no-files-found: error
          retention-days: 90

      - name: Commit PDF back to paper/ on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f paper/main.pdf
          if git diff --quiet --staged; then
            echo "No PDF change."
            exit 0
          fi
          git commit -m "ci: rebuild paper PDF [skip ci]"
          git push

      - name: Publish rolling release (latest-paper)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-paper
          name: Latest paper build
          body: |
            Auto-built paper PDF from commit ${{ github.sha }}.
            Download: `main.pdf` below.
          files: paper/main.pdf
          make_latest: true
          prerelease: false
